<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анимация логотипа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <video src="анимация лого 1.mp4" autoplay muted playsinline id="logo"></video>
    <script>
        const video = document.getElementById('logo');

        video.addEventListener('ended', () => {
            setTimeout(() => {
                video.currentTime = 0;
                video.play();
            }, 2000); // задержка 2 секунды
        });
    </script>
</body>
</html>
